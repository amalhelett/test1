<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.header{padding:16px 24px;background:#fff;border-bottom:1px solid #ddd;font-weight:600}
.container{padding:20px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px}
.table-wrap{overflow:auto;max-height:70vh;border:1px solid #ddd;border-radius:8px}
table{border-collapse:separate;border-spacing:0;width:100%}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
th{position:sticky;top:0;background:#fafafa;font-size:12px;text-transform:uppercase}
.num{text-align:right}
</style>
</head>
<body>
<div class="header">Inventory Dashboard (Auto)</div>
<div class="container">
<div class="card" id="summary"></div>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>SKU</th>
<th>ASIN</th>
<th>FC Sellable</th>
<th>FC Unsellable</th>
<th>FBA Available</th>
<th>FBA Unsellable</th>
<th>Total Sellable</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const SHEET_LINK = "https://docs.google.com/spreadsheets/d/1jZv_Qqeg2RWXssYroxyS3_fCW_D09Nqhbf6Px9s6pR4/export?format=xlsx";

async function loadData(){
  const res = await fetch(SHEET_LINK);
  const buf = await res.arrayBuffer();
  const wb = XLSX.read(buf,{type:'array'});

  const fcSell = XLSX.utils.sheet_to_json(wb.Sheets["Sellable inventory"],{defval:''});
  const fcUnsell = XLSX.utils.sheet_to_json(wb.Sheets["Unsellable"],{defval:''});
  const fba = XLSX.utils.sheet_to_json(wb.Sheets["FBA_Inventory"],{defval:''});

  const fcMap = new Map();
  fcSell.forEach(r=>{
    fcMap.set(r.asin||r.ASIN,{
      sku:r.sku||r.SKU,
      sell: Number(r.sellable||r.quantity||0)
    })
  })

  const unsellMap = new Map();
  fcUnsell.forEach(r=>{
    unsellMap.set(r.asin||r.ASIN, Number(r[Object.keys(r).slice(-1)[0]]||0))
  })

  const data=[];

  fba.forEach(r=>{
    const asin=r.asin||r.ASIN;
    if(!asin) return;

    const fc=fcMap.get(asin)||{sell:0,sku:"--"};
    const unsell=unsellMap.get(asin)||0;

    const fbaAvail=Number(r.available||r["afn-fulfillable-quantity"]||0);
    const fbaUnsell=Number(r.unfulfillable||r["afn-unsellable-quantity"]||0);

    data.push({
      sku:fc.sku,
      asin,
      fcSell:fc.sell,
      fcUnsell:unsell,
      fbaAvail,
      fbaUnsell,
      total:fc.sell+fbaAvail
    })
  })

  render(data)
}

function render(data){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML=data.map(r=>`<tr>
<td>${r.sku}</td>
<td>${r.asin}</td>
<td class="num">${r.fcSell}</td>
<td class="num">${r.fcUnsell}</td>
<td class="num">${r.fbaAvail}</td>
<td class="num">${r.fbaUnsell}</td>
<td class="num">${r.total}</td>
</tr>`).join("")

  const totalSell=data.reduce((a,b)=>a+b.total,0)
  document.getElementById("summary").innerHTML=`Total Units: <b>${totalSell}</b> | SKUs: <b>${data.length}</b>`
}

loadData();
</script>
</body>
</html>
